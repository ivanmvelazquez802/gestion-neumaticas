<!DOCTYPE html>
<html>
<head>
  <title>Gestión Neumáticas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; background:#f0f4f8; padding:20px;}
    .card { background:white; padding:15px; border-radius:10px; margin-bottom:15px;}
    h2 { text-align:center; }
    select { width:100%; padding:8px; margin-bottom:10px; }
    button { width:100%; padding:10px; background:#0077b6; color:white; border:none; border-radius:8px; }
  </style>

</head>

<body>

<h2>⚓ Gestión Neumáticas</h2>

<div class="card">
  <h3>Asignar lancha</h3>

  <select id="dia">
    <option>Lunes</option>
    <option>Martes</option>
    <option>Miércoles</option>
    <option>Jueves</option>
    <option>Viernes</option>
    <option>Sábado</option>
    <option>Domingo</option>
  </select>

  <select id="turno">
    <option>Mañana</option>
    <option>Tarde</option>
  </select>

  <select id="lancha">
    <option>N-01</option>
    <option>N-02</option>
    <option>N-03</option>
    <option>N-04</option>
  </select>

  <select id="entrenador">
    <option>Sergio</option>
    <option>Álvaro</option>
    <option>Carlos</option>
  </select>

  <button onclick="añadir()">Asignar</button>
</div>

<div id="resultado"></div>

<script>
const URL =https://https://docs.google.com/spreadsheets/d/1qizU7-hMShlMsOK5O64WNGCd0swQ7oMAtSywjbho8EE/tq?tqx=out:json ;

async function cargarDatos() {
  const res = await fetch(URL);
  const text = await res.text();

  const json = JSON.parse(text.substr(47).slice(0, -2));
  const rows = json.table.rows;

  let datos = [];

  rows.forEach(r => {
    datos.push({
      dia: r.c[0]?.v,
      turno: r.c[1]?.v,
      lancha: r.c[2]?.v,
      entrenador: r.c[3]?.v,
      categoria: r.c[4]?.v,
      evento: r.c[5]?.v,
    });
  });

  pintar(datos);
}

function pintar(datos) {
  let html = "";

  const dias = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

  dias.forEach(d => {
    const items = datos.filter(i => i.dia === d);

    if(items.length > 0){
      html += `<div class="card"><h3>${d}</h3>`;

      items.forEach(i => {
        html += `<p>${i.turno}: ${i.lancha} - ${i.entrenador} (${i.categoria})</p>`;
      });

      html += `</div>`;
    }
  });

  document.getElementById("resultado").innerHTML = html;
}

cargarDatos();
</script>
