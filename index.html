<!DOCTYPE html>
<html>
<head>
  <title>Gestión Neumáticas RCNGC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1f33;
      color: white;
    }

    header {
      background: #0077b6;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .contenedor {
      padding: 15px;
    }

    .bloque {
      margin-bottom: 20px;
    }

    .card {
      background: #112b45;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .hoy {
      background: #0f2f4f;
      padding: 10px;
      border-radius: 10px;
    }

    h3 {
      border-bottom: 2px solid #0077b6;
      padding-bottom: 5px;
    }

    h4 {
      margin: 8px 0 4px 0;
    }
  </style>
</head>

<body>

<header>⚓ Gestión Neumáticas RCNGC</header>

<div class="contenedor" id="app">Cargando...</div>

<script>

// 🔵 NORMALIZAR TEXTO
function normalizar(texto) {
  return (texto || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

// 🔥 DÍA ACTUAL
const hoy = normalizar(
  new Date().toLocaleDateString("es-ES", { weekday: "long" })
);

// 🔵 CARGAR DATOS
async function cargar() {

  try {

    const url = "https://docs.google.com/spreadsheets/d/1qizU7-hMShlMsOK5O64WNGCd0swQ7oMAtSywjbho8EE/export?format=csv&sheet=Hoja%201";

    const res = await fetch(url);
    const text = await res.text();

    const filas = text.trim().split(/\r?\n/).slice(1);

    let datos = filas.map(f => {
      const c = f.split(/,|;/);

      return {
        dia: (c[0] || "").trim(),
        turno: (c[1] || "").trim(),
        lancha: (c[2] || "").trim(),
        entrenador: (c[3] || "").trim(),
        categoria: (c[4] || "").trim(),
        evento: (c[5] || "").trim()
      };
    });

    // 🔥 LIMPIAR FILAS VACÍAS
    datos = datos.filter(d => d.dia !== "" && d.lancha !== "");

    pintar(datos);

  } catch (error) {
    document.getElementById("app").innerHTML = 
      "<p style='color:red'>❌ Error cargando datos</p>";
    console.error(error);
  }
}

// 🔥 PINTAR
function pintar(datos) {

  let html = "";

  const dias = ["lunes","martes","miercoles","jueves","viernes","sabado","domingo"];

  dias.forEach(d => {

    const items = datos.filter(i => normalizar(i.dia) === d);
    if(items.length === 0) return;

    const esHoy = d === hoy;

    html += `<div class="bloque ${esHoy ? 'hoy' : ''}">
      <h3>${esHoy ? '🔥 ' : ''}${d.toUpperCase()}</h3>`;

    const manana = items.filter(i => normalizar(i.turno) === "manana");
    const tarde = items.filter(i => normalizar(i.turno) === "tarde");

    function pintarCards(lista){
      lista.forEach(i => {

        let colorEvento = "";

        if(normalizar(i.evento) === "regata") colorEvento = "#ff4d4d";
        else if(normalizar(i.evento) === "entreno") colorEvento = "#4da6ff";

        html += `<div class="card">
          <strong>${i.lancha}</strong> - ${i.entrenador}
          ${i.categoria ? `<br><small>⛵ ${i.categoria}</small>` : ""}
          ${i.evento ? `<br><small style="color:${colorEvento}">📍 ${i.evento}</small>` : ""}
        </div>`;
      });
    }

    if(manana.length > 0){
      html += `<h4>🟦 Mañana</h4>`;
      pintarCards(manana);
    }

    if(tarde.length > 0){
      html += `<h4>🟨 Tarde</h4>`;
      pintarCards(tarde);
    }

    html += `</div>`;
  });

  document.getElementById("app").innerHTML = html;
}

// 🚀 ARRANCAR
cargar();

</script>

</body>
</html>
