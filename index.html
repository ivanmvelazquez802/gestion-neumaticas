<!DOCTYPE html>
<html>
<head>
  <title>Gestión Neumáticas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; background:#f0f4f8; padding:20px;}
    .card { background:white; padding:15px; border-radius:10px; margin-bottom:15px;}
    h2 { text-align:center; }
  </style>

</head>

<body>

<h2>⚓ Gestión Neumáticas</h2>

<div id="resultado"></div>

<script>

// 🔗 GOOGLE SHEETS (con proxy)
const URL = "https://api.allorigins.win/raw?url=https://docs.google.com/spreadsheets/d/1qizU7-hMShlMsOK5O64WNGCd0swQ7oMAtSywjbho8EE/gviz/tq?tqx=out:json";

// 📅 HOY
const hoy = normalizarTexto(
  new Date().toLocaleDateString("es-ES", { weekday: "long" })
);

// 🧠 NORMALIZAR TEXTO (quita acentos y mayúsculas)
function normalizarTexto(texto) {
  return (texto || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

// 🎨 COLORES
function colorCategoria(cat) {
  const c = normalizarTexto(cat);

  if(c === "optimist") return "#dbeafe";
  if(c === "ilca") return "#dcfce7";
  if(c === "420") return "#fef3c7";
  if(c === "snipe") return "#fde68a";
  if(c === "29er") return "#fbcfe8";
  if(c === "windsurf") return "#fce7f3";
  if(c === "windfoil") return "#ddd6fe";

  return "#e0f2fe";
}

// 🚀 CARGAR DATOS
async function cargarDatos() {
  try {
    const res = await fetch(URL);
    const text = await res.text();

    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    let datos = [];

    rows.forEach(r => {
      if (!r.c) return;

      datos.push({
        dia: r.c[0]?.v || "",
        turno: r.c[1]?.v || "",
        lancha: r.c[2]?.v || "",
        entrenador: r.c[3]?.v || "",
        categoria: r.c[4]?.v || "",
        evento: r.c[5]?.v || ""
      });
    });

    pintar(datos);

  } catch (error) {
    document.getElementById("resultado").innerHTML = 
      "<p style='color:red'>Error cargando datos</p>";
    console.error(error);
  }
}

// 🧩 PINTAR
function pintar(datos) {
  let html = "";

  const dias = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

  dias.forEach(d => {

    // SOLO HOY (tolerante a errores)
    if(normalizarTexto(d) !== hoy) return;

    const items = datos.filter(i => 
      normalizarTexto(i.dia) === hoy
    );

    // ordenar turno
    items.sort((a, b) => a.turno.localeCompare(b.turno));

    if(items.length > 0){
      html += `<div class="card"><h3>${d}</h3>`;

      items.forEach(i => {
        const color = colorCategoria(i.categoria);

        html += `
        <p style="background:${color}; padding:6px; border-radius:6px;">
          ${i.turno}: ${i.lancha} - ${i.entrenador} (${i.categoria})
        </p>
        `;
      });

      html += `</div>`;
    } else {
      html += `<div class="card"><h3>${d}</h3><p>Sin asignaciones</p></div>`;
    }
  });

  document.getElementById("resultado").innerHTML = html;
}

// 🔄 INICIAR
cargarDatos();

</script>

</body>
</html>
