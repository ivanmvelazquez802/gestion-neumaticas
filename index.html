<!DOCTYPE html>
<html>
<head>
  <title>Gestión Neumáticas RCNGC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1f33;
      color: white;
    }

    header {
      background: #0077b6;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    #actualizado {
      font-size: 12px;
      margin-top: 5px;
      opacity: 0.7;
    }

    #semana {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
      color: #ffd966;
    }

    .contenedor {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    .resumen {
      background: #112b45;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
      font-weight: bold;
    }

    .bloque {
      margin-bottom: 25px;
    }

    .card {
      background: #112b45;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .duplicado {
      background: #ff9933 !important;
      color: black;
    }

    .hoy {
      background: #0f2f4f;
      padding: 10px;
      border-radius: 10px;
    }

    .alertas {
      background: #ff4d4d;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    h3 {
      border-bottom: 2px solid #0077b6;
      padding-bottom: 5px;
    }

    h4 {
      margin: 8px 0 4px 0;
    }
  </style>
</head>

<body>

<header>
  ⚓ Gestión Neumáticas RCNGC
  <div id="actualizado"></div>
  <div id="semana"></div>
</header>

<div class="contenedor" id="app">Cargando...</div>

<script>

// 📅 ACTUALIZADO
document.getElementById("actualizado").innerText =
  "📅 Actualizado: " + new Date().toLocaleString("es-ES");

// 📅 SEMANA
function obtenerSemana() {
  const hoy = new Date();
  const dia = hoy.getDay();
  const diferencia = dia === 0 ? -6 : 1 - dia;

  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() + diferencia);

  const domingo = new Date(lunes);
  domingo.setDate(lunes.getDate() + 6);

  const formato = (fecha) =>
    fecha.toLocaleDateString("es-ES", {
      weekday: "long",
      day: "numeric",
      month: "long"
    });

  return `📅 SEMANA: ${formato(lunes).toUpperCase()} – ${formato(domingo).toUpperCase()}`;
}

document.getElementById("semana").innerText = obtenerSemana();

// 📆 FECHAS POR DÍA
function obtenerFechasSemana() {
  const hoy = new Date();
  const dia = hoy.getDay();
  const diferencia = dia === 0 ? -6 : 1 - dia;

  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() + diferencia);

  const dias = ["lunes","martes","miercoles","jueves","viernes","sabado","domingo"];
  let mapa = {};

  dias.forEach((d, i) => {
    const fecha = new Date(lunes);
    fecha.setDate(lunes.getDate() + i);

    mapa[d] = fecha.toLocaleDateString("es-ES", {
      day: "numeric",
      month: "long"
    });
  });

  return mapa;
}

const fechasSemana = obtenerFechasSemana();

// NORMALIZAR
function normalizar(texto) {
  return (texto || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

// CARGAR DATOS
async function cargar() {

  try {

    const url = "https://docs.google.com/spreadsheets/d/1qizU7-hMShlMsOK5O64WNGCd0swQ7oMAtSywjbho8EE/export?format=csv&sheet=Hoja%201";

    const res = await fetch(url);
    const text = await res.text();

    const filas = text.trim().split(/\r?\n/).slice(1);

    let datos = filas.map(f => {
      const c = f.split(/,|;/);

      return {
        dia: (c[0] || "").trim(),
        turno: (c[1] || "").trim(),
        lancha: (c[2] || "").trim(),
        entrenador: (c[3] || "").trim(),
        categoria: (c[4] || "").trim(),
        evento: (c[5] || "").trim(),
        tipo: (c[6] || "").trim()
      };
    });

    datos = datos.filter(d => d.dia !== "" && d.lancha !== "");

    pintar(datos);

  } catch (error) {
    document.getElementById("app").innerHTML =
      "<p style='color:red'>❌ Error cargando datos</p>";
  }
}

// PINTAR
function pintar(datos) {

  let html = "";

  let alertasAsignar = [];
  let alertasTierra = [];

  let agua = 0;
  let tierra = 0;
  let mantenimiento = 0;

  const flota = [
    "N-01","N-02","N-03","N-04","N-05","N-06","N-07","N-08","N-09",
    "N-10","N-11","N-12","N-13","N-14","N-15","N-16","N-17","N-18",
    "N-19","N-20","N-21","N-22","N-23","N-24","N-25","N-26","N-27"
  ];

  const usadas = datos.map(d => d.lancha);

  // ALERTAS + RESUMEN
  datos.forEach(i => {

    const tipo = normalizar(i.tipo);

    if(tipo === "agua") agua++;
    if(tipo === "tierra") tierra++;
    if(tipo === "mantenimiento") mantenimiento++;

    if(tipo === "tierra"){
      alertasTierra.push(`⚠️ ${i.lancha} en TIERRA (${i.dia})`);
    }

  });

  // Lanchas sin usar
  flota.forEach(l => {
    if(!usadas.includes(l)){
      alertasAsignar.push(`⚠️ ${l} SIN ASIGNAR`);
    }
  });

  const totalAlertas = alertasAsignar.length + alertasTierra.length;

  // 🔥 RESUMEN
  html += `<div class="resumen">
    🚨 ${totalAlertas} incidencias | 🚤 ${agua} Agua | 🏖 ${tierra} Tierra | 🛠 ${mantenimiento} Mantenimiento
  </div>`;

  // 🔴 ALERTAS ORDENADAS
  if(totalAlertas > 0){
    html += `<div class="alertas">
      <h3>⚠️ ALERTAS</h3>
      ${alertasAsignar.join("<br>")}
      ${alertasTierra.join("<br>")}
    </div>`;
  }

  const dias = ["lunes","martes","miercoles","jueves","viernes","sabado","domingo"];

  dias.forEach(d => {

    const items = datos.filter(i => normalizar(i.dia) === d);
    if(items.length === 0) return;

    let contador = {};
    items.forEach(i => {
      contador[i.lancha] = (contador[i.lancha] || 0) + 1;
    });

    html += `<div class="bloque">
      <h3>${d.toUpperCase()} ${fechasSemana[d].toUpperCase()}</h3>`;

    const manana = items.filter(i => normalizar(i.turno) === "manana");
    const tarde = items.filter(i => normalizar(i.turno) === "tarde");

    function pintarCards(lista){
      lista.forEach(i => {

        const esDuplicado = contador[i.lancha] > 1;

        html += `<div class="card ${esDuplicado ? 'duplicado' : ''}">
          <strong>${i.lancha}</strong> - ${i.entrenador || "⚠️ SIN ASIGNAR"}
        </div>`;
      });
    }

    if(manana.length > 0){
      html += `<h4>🟦 Mañana</h4>`;
      pintarCards(manana);
    }

    if(tarde.length > 0){
      html += `<h4>🟨 Tarde</h4>`;
      pintarCards(tarde);
    }

    html += `</div>`;
  });

  document.getElementById("app").innerHTML = html;
}

// ARRANCAR
cargar();

</script>

</body>
</html>
