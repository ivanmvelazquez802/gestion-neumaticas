<!DOCTYPE html>
<html>
<head>
  <title>Gestión Neumáticas RCNGC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1f33;
      color: white;
    }

    header {
      background: #0077b6;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .contenedor {
      padding: 15px;
    }

    .dia {
      margin-bottom: 20px;
    }

    .dia h3 {
      margin-bottom: 10px;
      border-bottom: 2px solid #0077b6;
      padding-bottom: 5px;
    }

    .card {
      background: #112b45;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .turno {
      font-weight: bold;
      color: #90e0ef;
    }

    .lancha {
      font-size: 18px;
      font-weight: bold;
    }

    .categoria {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>

</head>

<body>

<header>⚓ Gestión Neumáticas RCNGC</header>

<div class="contenedor" id="app"></div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/1qizU7-hMShlMsOK5O64WNGCd0swQ7oMAtSywjbho8EE/export?format=csv&sheet=Hoja%201";

function normalizar(texto) {
  return (texto || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

async function cargar() {
  const res = await fetch(URL);
  const text = await res.text();

  const filas = text.trim().split("\n").slice(1);

  let datos = filas.map(f => {
    const c = f.split(",");
    return {
      dia: c[0],
      turno: c[1],
      lancha: c[2],
      entrenador: c[3],
      categoria: c[4],
      evento: c[5]
    };
  });

  pintar(datos);
}

function pintar(datos) {
  const diasOrden = ["lunes","martes","miercoles","jueves","viernes","sabado","domingo"];
  let html = "";

  diasOrden.forEach(d => {
    const items = datos.filter(i => normalizar(i.dia) === d);

    if(items.length === 0) return;

    html += `<h3>${d.toUpperCase()}</h3>`;

    items.forEach(i => {
      html += `
        <div style="background:#112b45; padding:10px; border-radius:8px; margin-bottom:8px;">
          <strong>${i.turno}</strong><br>
          ${i.lancha} - ${i.entrenador}<br>
          <small>${i.categoria} ${i.evento ? "- " + i.evento : ""}</small>
        </div>
      `;
    });
  });

  document.getElementById("app").innerHTML = html;
}

cargar();

</script>

</body>
</html>
