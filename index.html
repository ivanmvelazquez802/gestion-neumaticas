<!DOCTYPE html>
<html>
<head>
  <title>Gestión Neumáticas RCNGC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1f33;
      color: white;
    }

    header {
      background: #0077b6;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .contenedor {
      padding: 15px;
    }

    .bloque {
      margin-bottom: 20px;
    }

    .card {
      background: #112b45;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 6px;
    }

    h3 {
      border-bottom: 2px solid #0077b6;
      padding-bottom: 5px;
    }

    h4 {
      margin: 8px 0 4px 0;
    }
  </style>

</head>

<body>

<header>⚓ Gestión Neumáticas RCNGC</header>

<div class="contenedor" id="app"></div>

<script>

// 🔵 NORMALIZAR TEXTO
function normalizar(texto) {
  return (texto || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

// 🔵 CARGAR DATOS
async function cargar() {

  // 🔹 HOJA 1 (PLANIFICACIÓN)
  const res1 = await fetch("https://docs.google.com/spreadsheets/d/1qizU7-hMShlMsOK5O64WNGCd0swQ7oMAtSywjbho8EE/export?format=csv&sheet=Hoja%201");
  const text1 = await res1.text();

  const filas1 = text1.trim().split("\n").slice(1);

  let asignaciones = filas1.map(f => {
    const c = f.split(",");
    return {
      dia: c[0],
      turno: c[1],
      lancha: c[2],
      entrenador: c[3]
    };
  });

  // 🔥 HOJA FLOTA (PUBLICADA)
  const res2 = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRPAuEcLWGMiKwNrvEaZMf6Uz-bwoGxPKOxGIxjWM7v49Mf6LJZb5bLAcOOKBqMNN5bU40N7c0gX/pub?output=csv");
  const text2 = await res2.text();

const filas2 = text2.trim().split("\n").slice(1);

let flota = filas2.map(f => {
  const c = f.split(/,|;/); // 👈 clave

  return {
    lancha: (c[0] || "").trim(),
    estado: (c[1] || "").trim()
  };
});

  pintar(asignaciones, flota);
}

// 🔥 PINTAR TODO
function pintar(asignaciones, flota) {

  let listaAgua = [];
  let listaTierra = [];
  let listaMant = [];

  flota.forEach(i => {

    const e = normalizar(i.estado);

    if(e.includes("agua")){
      listaAgua.push(i.lancha);
    }
    else if(e.includes("tierra")){
      listaTierra.push(i.lancha);
    }
    else if(e.includes("mantenimiento")){
      listaMant.push(i.lancha);
    }

  });

  let html = "";

  // 🚤 FLOTAS
  html += `<div class="bloque"><h3>🚤 En el agua</h3>${listaAgua.map(l => `<div class="card">${l}</div>`).join("")}</div>`;
  html += `<div class="bloque"><h3>🏖 En tierra</h3>${listaTierra.map(l => `<div class="card">${l}</div>`).join("")}</div>`;
  html += `<div class="bloque"><h3>🛠 Mantenimiento</h3>${listaMant.map(l => `<div class="card">${l}</div>`).join("")}</div>`;

  // 📅 PLANIFICACIÓN
  const diasOrden = ["lunes","martes","miercoles","jueves","viernes","sabado","domingo"];

  diasOrden.forEach(d => {

    const items = asignaciones.filter(i => normalizar(i.dia) === d);
    if(items.length === 0) return;

    html += `<div class="bloque"><h3>${d.toUpperCase()}</h3>`;

    const manana = items.filter(i => normalizar(i.turno) === "manana");
    const tarde = items.filter(i => normalizar(i.turno) === "tarde");

    if(manana.length > 0){
      html += `<h4>🟦 Mañana</h4>`;
      manana.forEach(i => {
        html += `<div class="card">${i.lancha} - ${i.entrenador}</div>`;
      });
    }

    if(tarde.length > 0){
      html += `<h4>🟨 Tarde</h4>`;
      tarde.forEach(i => {
        html += `<div class="card">${i.lancha} - ${i.entrenador}</div>`;
      });
    }

    html += `</div>`;
  });

  document.getElementById("app").innerHTML = html;
}

cargar();

</script>

</body>
</html>
